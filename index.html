<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Untitled</title>
    <link rel="stylesheet" href="./style.css">

  </head>
    
  <body>
  <!-- STEAM BACKGROUND -->
<div class="steam-bg">
  <div class="steam steam1"></div>
  <div class="steam steam2"></div>
  <div class="steam steam3"></div>
  <div class="steam steam4"></div>
  <div class="steam steam5"></div>
</div>

<!-- DASHBOARD WRAPPER -->
<div class="dashboard-wrapper">
  <div class="dashboard">

    <!-- AVATAR CARD -->
    <div class="box box1">
      <div class="avatar-frame">
        <img src="https://i.imgur.com/9fbiVGx.png" class="sticker" alt="GPT Avatar">
      </div>
      <h2>Surviving on Coffee and Chaos</h2>
    </div>

    <!-- TIME CARD -->
    <div class="box box2">
      <p class="label">Current Time</p>
      <h3 id="greeting">Loading...</h3>
      <div id="time" class="big-text">--:--</div>
      <p id="date">Loading date...</p>
    </div>

    <!-- COUNTDOWN CARD -->
    <div class="box box3">
      <p class="label">Countdown</p>
      <div id="countdownDays" class="big-text">-- days</div>
      <p id="countdownDetail">
        until Last Day of School for Kids!!<br>
        June 16, 2026
      </p>
    </div>

    <!-- QUOTE CARD -->
    <div class="box box4">
      <p class="label">Caffeinated Wisdom</p>
      <div id="quoteBox" class="quote-text">Loading quote...</div>
     
  

  </div>
</div>
    <script  src="./script.js"></script>

  </body>
  
</html>
